<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect World — Descargar App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F1117;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1C1F2A;
      border: 1px solid #2A2D3E;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 460px;
      width: 90%;
    }
    .logo {
      font-size: 42px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #E50914;
    }
    .subtitle {
      font-size: 14px;
      color: #8A8FA8;
      margin-bottom: 36px;
    }
    .version-badge {
      display: inline-block;
      background: #E50914;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #E50914;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 20px;
    }
    .btn:hover { background: #c1070f; }
    .url-box {
      background: #0F1117;
      border: 1px solid #2A2D3E;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #6B7080;
      word-break: break-all;
      margin-top: 8px;
      text-align: left;
    }
    .url-box span { color: #E50914; font-weight: 600; }
    .note {
      font-size: 12px;
      color: #5A5F75;
      margin-top: 28px;
      line-height: 1.6;
    }
    .divider {
      border: none;
      border-top: 1px solid #2A2D3E;
      margin: 24px 0;
    }
    .downloader-tip {
      font-size: 13px;
      color: #8A8FA8;
      background: #13161F;
      border-radius: 8px;
      padding: 14px;
      text-align: left;
      line-height: 1.7;
    }
    .downloader-tip strong { color: #fff; }
    .downloader-tip code {
      background: #1C1F2A;
      color: #E50914;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#127909;</div>
    <h1>Connect World</h1>
    <p class="subtitle">Tu app de IPTV para Fire TV &amp; Android</p>
    <div class="version-badge" id="versionBadge">v1.0.3</div>
    <br/>
    <a class="btn" id="downloadBtn" href="#">
      &#8595; Descargar APK
    </a>
    <div class="url-box">
      URL para Downloader:<br/>
      <span id="shortUrl"></span>
    </div>
    <hr class="divider" />
    <div class="downloader-tip">
      <strong>Instalar en Fire TV / Firestick:</strong><br/>
      1. Abre la app <strong>Downloader</strong><br/>
      2. Ingresa la URL: <code id="tipUrl"></code><br/>
      3. Descarga e instala el APK
    </div>
    <p class="note">Requiere permitir instalaci&oacute;n de fuentes desconocidas en tu dispositivo.</p>
  </div>

  <script>
    // ── ACTUALIZA SOLO ESTOS DOS VALORES EN CADA RELEASE ──────────────
    var VERSION = 'v1.0.7';
    var APK_URL = 'https://github.com/otniel0820/frontend-app-connect-world-v1/releases/download/v1.0.7/app-release.apk';
    // ──────────────────────────────────────────────────────────────────

    var pageUrl = window.location.href.replace(/\/$/, '');

    document.getElementById('versionBadge').textContent = VERSION;
    document.getElementById('downloadBtn').href = APK_URL;
    document.getElementById('shortUrl').textContent = pageUrl;
    document.getElementById('tipUrl').textContent = pageUrl;
  </script>
</body>
</html>
